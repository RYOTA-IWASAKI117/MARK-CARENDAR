<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MARK CALENDAR</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{
background:#121212;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
}

h1{
margin-top:30px;
letter-spacing:4px;
}

#capture{
background:#1e1e1e;
padding:20px;
border-radius:12px;
max-width:900px;
margin:auto;
}

#calendar{
max-width:900px;
margin:auto;
}

button{
background:#444;
color:white;
border:none;
padding:14px 22px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin:30px;
}

button:hover{
background:#666;
}

</style>

</head>

<body>

<h1>MARK CALENDAR</h1>

<div id="capture">

<h2>MARK CALENDAR</h2>

<div id="calendar"></div>

</div>

<button onclick="saveImage()">保存して共有</button>

<script>

let calendar

document.addEventListener('DOMContentLoaded',function(){

let calendarEl=document.getElementById('calendar')

calendar=new FullCalendar.Calendar(calendarEl,{

initialView:'dayGridMonth',

dateClick:function(info){

let date=info.dateStr

let existingEvent=calendar.getEvents().find(e=>e.startStr===date)


// 既にある場合 → 削除
if(existingEvent){

existingEvent.remove()

}


// 無い場合 → 時間入力
else{

let start=prompt("開始時間 (例 18:00)")
if(!start) return

let end=prompt("終了時間 (例 21:00)")
if(!end) return

calendar.addEvent({

title:`${start}-${end}`,

start:date,

allDay:true

})

}

}

})

calendar.render()

})



function saveImage(){

html2canvas(document.querySelector("#capture")).then(canvas=>{

canvas.toBlob(function(blob){

const file=new File([blob],"mark-calendar.png",{type:"image/png"})

if(navigator.share){

navigator.share({
files:[file],
title:"MARK CALENDAR"
})

}else{

let link=document.createElement("a")
link.download="mark-calendar.png"
link.href=canvas.toDataURL()
link.click()

}

})

})

}

</script>

</body>
</html>
